<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #0b0711; color: white; height: 100vh;" class="d-flex align-items-center justify-content-center">
    <div class="p-4 mx-3 text-center" style="background-color: #130924; border: 1px solid #261342; border-radius: 12px; width: 100%; max-width: 420px;">
        <h3 class="fw-bold mb-1">🔑 Recuperar Senha</h3>
        <p class="text-white-50 small mb-4">Insira o seu Nome de Usuário para disparar o link</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2 border-0 text-start" style="border-radius: 8px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/recuperar-senha" method="POST">
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small fw-medium">Seu Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Digite seu usuário cadastrado" required style="background-color: #1c0f35; border: 1px solid #3d1d6d; color: white; padding: 11px 14px; border-radius: 8px;">
            </div>
            <button type="submit" class="btn fw-bold w-100 py-2.5 text-white" style="background-color: #8a2be2; border: none; border-radius: 8px;">Enviar Link de Recuperação</button>
        </form>
        <a href="/login" class="d-block small mt-3 text-white-50 text-decoration-none">Voltar para o Login</a>
    </div>
</body>
</html>
