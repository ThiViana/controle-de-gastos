<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0711;
            --card-bg: #130924;
            --border-color: #261342;
            --primary-purple: #8b5cf6;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .recovery-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .form-control {
            background-color: #0b0711;
            border: 1px solid var(--border-color);
            color: white;
        }
        .form-control:focus {
            background-color: #0b0711;
            border-color: var(--primary-purple);
            color: white;
            box-shadow: none;
        }
        .btn-purple {
            background-color: var(--primary-purple);
            color: white;
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }
        .btn-purple:hover {
            background-color: #7c3aed;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="recovery-card">
        <h4 class="fw-bold mb-2 text-center">🔑 Recuperar Senha</h4>
        <p class="text-white-50 small text-center mb-4">Confirme seus dados cadastrados para solicitar o reset de senha.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2 text-center" style="background-color: #0b0711; color: white; border-color: var(--border-color);">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('esqueci_senha') }}" method="POST">
            <div class="mb-3">
                <label class="form-label small text-white-50">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Seu usuário" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50">E-mail de Segurança</label>
                <input type="email" name="email" class="form-control" placeholder="seuemail@exemplo.com" required>
            </div>
            <button type="submit" class="btn btn-purple w-100 py-2 mb-3">Solicitar Reset</button>
            <div class="text-center">
                <a href="{{ url_for('login') }}" class="small" style="color: var(--primary-purple); text-decoration: none;">Voltar para o Login</a>
            </div>
        </form>
    </div>

</body>
</html>
