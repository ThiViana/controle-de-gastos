<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nova Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #0b0711; color: white; height: 100vh;" class="d-flex align-items-center justify-content-center">
    <div class="p-4 mx-3 text-center" style="background-color: #130924; border: 1px solid #261342; border-radius: 12px; width: 100%; max-width: 420px;">
        <h3 class="fw-bold mb-1">🔒 Nova Senha</h3>
        <p class="text-white-50 small mb-4">Escolha a sua nova credencial de acesso segura</p>

        <form action="" method="POST">
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small fw-medium">Nova Senha</label>
                <input type="password" name="nova_senha" class="form-control" placeholder="Mínimo 6 dígitos" required 
                       style="background-color: #1c0f35; border: 1px solid #3d1d6d; color: white; padding: 11px 14px; border-radius: 8px;">
            </div>
            <button type="submit" class="btn fw-bold w-100 py-2.5" style="background-color: #00e5ff; color: #0b0711; border: none; border-radius: 8px;">Atualizar e Logar</button>
        </form>
    </div>
</body>
</html>
