<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Gastos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-entrar { background-color: #8a2be2; border: none; border-radius: 8px; transition: all 0.2s; }
        .btn-entrar:hover { background-color: #a044ff !important; box-shadow: 0 0 12px rgba(138, 43, 226, 0.5); transform: translateY(-1px); }
    </style>
</head>
<body style="background-color: #0b0711; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh;" class="d-flex align-items-center justify-content-center">
    <div class="p-4 mx-3 text-center" style="background-color: #130924; border: 1px solid #261342; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);">
        <h2 class="fw-bold mb-1">🔑 Acessar Painel</h2>
        <p class="text-white-50 small mb-4">Entre com o seu usuário para gerenciar gastos</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2 text-start border-0" style="border-radius: 8px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small fw-medium">Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Seu nome de usuário" required style="background-color: #1c0f35; border: 1px solid #3d1d6d; color: white; padding: 11px 14px; border-radius: 8px;">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small fw-medium">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="••••••••" required style="background-color: #1c0f35; border: 1px solid #3d1d6d; color: white; padding: 11px 14px; border-radius: 8px;">
            </div>
            <button type="submit" class="btn btn-entrar fw-bold w-100 py-2.5 mb-2 text-white">Fazer Login</button>
        </form>
        <p class="small text-white-50 mb-1"><a href="/recuperar-senha" style="color: #ff769f; text-decoration: none;">Esqueceu sua senha?</a></p>
        <p class="small text-white-50 mb-0">Não tem conta? <a href="/cadastro" style="color: #00e5ff; text-decoration: none; font-weight: 600;">Cadastre-se aqui</a></p>
    </div>
</body>
</html>
